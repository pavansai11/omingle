services:
  - type: web
    name: hippichat
    env: node
    plan: standard
    buildCommand: YARN_PRODUCTION=false yarn install --frozen-lockfile && yarn build
    startCommand: NODE_OPTIONS=--max-old-space-size=1536 yarn start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: NEXT_PUBLIC_BASE_URL
        value: https://hippichat.com
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        value: HippiChat
      - key: CORS_ORIGINS
        value: https://hippichat.com,https://www.hippichat.com,http://localhost:3000,http://127.0.0.1:3000
      - key: COTURN_STATIC_AUTH_SECRET
        sync: false
      - key: TURN_HOST
        value: turn.hippichat.com
      - key: TURN_PORT
        value: 3478
      - key: TURN_CREDENTIAL_TTL_SECONDS
        value: 3600
      - key: NEXT_PUBLIC_MONETAG_ZONE_WAITING
        value: 10800687
      - key: NEXT_PUBLIC_DIRECT_LINK_URL
        value: https://omg10.com/4/10800693
