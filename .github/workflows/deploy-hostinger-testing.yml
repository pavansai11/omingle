name: Deploy testing branch to Hostinger VPS

on:
  push:
    branches:
      - testing
  workflow_dispatch:

jobs:
  deploy-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy testing over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            export APP_DIR="${{ secrets.HOSTINGER_TESTING_APP_DIR }}"
            export BRANCH="testing"
            export PM2_APP_NAME="hippichat-testing"
            export APP_PORT="3001"
            bash "$APP_DIR/scripts/deploy-hostinger.sh"